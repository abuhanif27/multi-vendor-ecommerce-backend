name: Continuous Integration

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  quality:
    name: Code Quality (Linting, Formatting, Typing, Security)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff black isort mypy bandit coverage pytest pytest-django django-stubs
          pip install -r requirements.txt

      - name: Check Formatting (Black)
        run: black --check .

      - name: Check Imports (isort)
        run: isort --check-only .

      - name: Lint (Ruff)
        run: ruff check .

      - name: Type Check (Mypy)
        run: mypy --config-file=pyproject.toml .

      - name: Security Scan (Bandit)
        run: bandit -r apps config -c pyproject.toml

  test:
    name: Unit Tests & Migrations
    runs-on: ubuntu-latest
    needs: quality
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: ecommerce_user
          POSTGRES_PASSWORD: ecommerce_password
          POSTGRES_DB: ecommerce_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install coverage
          pip install -r requirements.txt

      - name: Check missing migrations
        env:
          DATABASE_URL: postgres://ecommerce_user:ecommerce_password@localhost:5432/ecommerce_db
          REDIS_URL: redis://localhost:6379/0
        run: |
          python manage.py makemigrations --check --dry-run

      - name: Run Tests with Coverage
        env:
          DATABASE_URL: postgres://ecommerce_user:ecommerce_password@localhost:5432/ecommerce_db
          REDIS_URL: redis://localhost:6379/0
        run: |
          coverage run manage.py test
          coverage report --fail-under=85
          coverage xml

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v3
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
